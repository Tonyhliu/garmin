name: Garmin sync

# Runs in the cloud every morning. It (1) pulls the latest Garmin data and commits
# it back into the garmin/ folder, (2) emails a daily digest via Resend, and
# (3) publishes a password-protected dashboard to GitHub Pages.
#
# GitHub Actions runners are ephemeral, so the commit step is what makes the data
# persist between runs.

on:
  schedule:
    # 06:17 UTC daily. Cron here is always UTC — adjust to your timezone.
    - cron: "17 6 * * *"
  workflow_dispatch: {}   # lets you click "Run workflow" manually in the Actions tab

# Allow the job to push data back to the repo AND to deploy GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two syncs at once; let the in-progress one finish.
concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull Garmin data
        env:
          # The base64 token bundle printed by `python sync_garmin.py --login`.
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python sync_garmin.py --days 7 --sink files --out ./garmin

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin
          if git diff --cached --quiet; then
            echo "No new Garmin data to commit."
          else
            git commit -m "chore: garmin sync $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send digest + build dashboard
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GARMIN_MAIL_TO: ${{ secrets.GARMIN_MAIL_TO }}
          GARMIN_MAIL_FROM: ${{ vars.GARMIN_MAIL_FROM }}
          # AI coach (optional — if unset, the digest still sends without coaching).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GARMIN_RACE_NAME: ${{ vars.GARMIN_RACE_NAME }}
          GARMIN_RACE_DATE: ${{ vars.GARMIN_RACE_DATE }}
          # Stable public URL of the Pages site (content is encrypted, see below).
          DASHBOARD_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        run: python report.py --out ./garmin --days 14

      - name: Commit dashboard + plan
        run: |
          git add garmin            # picks up dashboard.html and plan.json
          if git diff --cached --quiet; then
            echo "No dashboard/plan change to commit."
          else
            git commit -m "chore: garmin dashboard $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Encrypt dashboard (client-side password gate)
        env:
          # StatiCrypt reads the password from this env var; never printed/committed.
          STATICRYPT_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          mkdir -p public
          # --short skips StatiCrypt's interactive short-password prompt (which would
          # hang CI). Use a STRONG DASHBOARD_PASSWORD — the encrypted file is public.
          npx --yes staticrypt@3 garmin/dashboard.html -d public --short
          mv public/dashboard.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
