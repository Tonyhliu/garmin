<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Garmin dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body{font:15px -apple-system,Segoe UI,Arial,sans-serif;margin:0;background:#fafafa;color:#222}
  header{padding:20px 24px;background:#fff;border-bottom:1px solid #eee}
  h1{margin:0;font-size:20px} .sub{color:#888;font-size:13px;margin-top:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:24px;max-width:1200px;margin:0 auto}
  .card{background:#fff;border:1px solid #eee;border-radius:10px;padding:14px}
  .card h3{margin:0 0 4px;font-size:14px} .card .now{font-size:22px;font-weight:700}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px 40px}
  table{border-collapse:collapse;width:100%;background:#fff;border:1px solid #eee;border-radius:10px;overflow:hidden}
  th,td{padding:8px 12px;text-align:left;font-size:13px;border-bottom:1px solid #f0f0f0}
  th{color:#888;font-weight:600}
</style>
</head>
<body>
<header>
  <h1>Garmin dashboard</h1>
  <div class="sub" id="sub"></div>
</header>
<div class="grid" id="grid"></div>
<div class="wrap">
  <h2 style="font-size:16px">Workouts</h2>
  <table id="workouts"><thead><tr><th>Date</th><th>Activity</th><th>Distance</th><th>Time</th><th>Avg HR</th></tr></thead><tbody></tbody></table>
</div>
<script id="data" type="application/json">{"dates": ["2026-06-16", "2026-06-17", "2026-06-18", "2026-06-19", "2026-06-20", "2026-06-21", "2026-06-22", "2026-06-23", "2026-06-24", "2026-06-25", "2026-06-26", "2026-06-27", "2026-06-28", "2026-06-29"], "metrics": {"resting_hr": [null, null, null, null, null, null, null, 48.0, 49.0, 43.0, 40.0, 48.0, 45.0, null], "hrv": [null, null, null, null, null, null, null, 107.0, 69.0, 109.0, 115.0, 98.0, 98.0, null], "sleep_hours": [null, null, null, null, null, null, null, 3.683333333333333, 4.516666666666667, 7.572777777777778, 6.0, 7.766666666666667, 6.283333333333333, null], "sleep_score": [null, null, null, null, null, null, null, 49.0, 35.0, 89.0, 76.0, 89.0, 78.0, null], "readiness": [null, null, null, null, null, null, null, 30.0, 25.0, 65.0, 50.0, 72.0, 40.0, null], "body_battery_high": [null, null, null, null, null, null, null, 69.0, 28.0, 90.0, 100.0, 83.0, 100.0, null], "stress": [null, null, null, null, null, null, null, 35.0, 42.0, 9.0, 34.0, 20.0, 20.0, null], "steps": [null, null, null, null, null, null, null, 19412.0, 21912.0, 2281.0, 24388.0, 9093.0, 32627.0, null]}, "meta": [{"key": "resting_hr", "label": "Resting HR", "unit": "bpm", "color": "#e1567c"}, {"key": "hrv", "label": "HRV (overnight)", "unit": "ms", "color": "#3a86ff"}, {"key": "sleep_hours", "label": "Sleep", "unit": "h", "color": "#7048e8"}, {"key": "sleep_score", "label": "Sleep score", "unit": "", "color": "#9775fa"}, {"key": "readiness", "label": "Training readiness", "unit": "", "color": "#2f9e44"}, {"key": "body_battery_high", "label": "Body battery (peak)", "unit": "", "color": "#f59f00"}, {"key": "stress", "label": "Stress (avg)", "unit": "", "color": "#fa5252"}, {"key": "steps", "label": "Steps", "unit": "", "color": "#1098ad"}], "workouts": [{"name": "Millbrae Running", "day": "2026-06-28", "dist": "25.77 km", "dur": "2h 31m", "hr": "150 bpm"}, {"name": "Anaheim Running", "day": "2026-06-26", "dist": "11.28 km", "dur": "1h 9m", "hr": "152 bpm"}, {"name": "Treadmill Running", "day": "2026-06-24", "dist": "8.16 km", "dur": "43m", "hr": "144 bpm"}, {"name": "06.23 tempo", "day": "2026-06-23", "dist": "9.70 km", "dur": "53m", "hr": "149 bpm"}], "generated": "2026-06-29T21:27:32"}</script>
<script>
const D = JSON.parse(document.getElementById('data').textContent);
document.getElementById('sub').textContent =
  `${D.dates[0]} – ${D.dates[D.dates.length-1]} · generated ${D.generated}`;
const grid = document.getElementById('grid');
for (const m of D.meta) {
  const vals = D.metrics[m.key];
  const present = vals.filter(v => v !== null);
  const now = present.length ? present[present.length-1] : null;
  const card = document.createElement('div');
  card.className = 'card';
  const unit = m.unit ? ' ' + m.unit : '';
  card.innerHTML = `<h3>${m.label}</h3><div class="now">${now===null?'—':(Math.round(now*10)/10)+unit}</div><canvas></canvas>`;
  grid.appendChild(card);
  new Chart(card.querySelector('canvas'), {
    type: 'line',
    data: { labels: D.dates.map(d => d.slice(5)),
            datasets: [{ data: vals, borderColor: m.color, backgroundColor: m.color+'22',
                         tension: 0.3, spanGaps: true, fill: true, pointRadius: 2 }] },
    options: { plugins:{legend:{display:false}}, scales:{x:{ticks:{maxTicksLimit:7}}},
               maintainAspectRatio: true, aspectRatio: 2 }
  });
}
const tb = document.querySelector('#workouts tbody');
if (!D.workouts.length) tb.innerHTML = '<tr><td colspan="5" style="color:#888">No workouts in this window.</td></tr>';
for (const w of D.workouts) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${w.day}</td><td>${w.name}</td><td>${w.dist}</td><td>${w.dur}</td><td>${w.hr}</td>`;
  tb.appendChild(tr);
}
</script>
</body>
</html>
